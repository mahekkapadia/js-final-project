<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Task Management System</title>

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- Bootstrap Icons -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

        <!-- Google Font -->
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
            rel="stylesheet">

        <link rel="stylesheet" href="../css/style.css">



    </head>

    <body>

        <div class="container">
            <h1> <i class="bi bi-list-check"></i> Task Management System </h1>
            <div class="row text-center my-4">

            <div class="row text-center my-4">
                <div class="col-md-4">
                    <div class="p-3 shadow-sm bg-light rounded">
                        <h5>Assigned</h5>
                        <h3 id="assignedCount">0</h3>
                    </div>
                </div>
            
                <div class="col-md-4">
                    <div class="p-3 shadow-sm bg-light rounded">
                        <h5>Completed</h5>
                        <h3 id="completedCount">0</h3>
                    </div>
                </div>
            
                <div class="col-md-4">
                    <div class="p-3 shadow-sm bg-light rounded">
                        <h5>Incomplete</h5>
                        <h3 id="incompleteCount">0</h3>
                    </div>
                </div>
            
            </div>

            <div class="glass">
            
                <form id="taskForm">
                
                    <div class="row">
                    
                        <div class="col-md-6 mb-3">
                            <label>Task Name</label>
                            <div id="titleError" class="error-text"></div>
                            <input type="text" id="title" class="form-control" placeholder="Enter task name">
                        </div>
                    
                        <div class="col-md-6 mb-3">
                            <label>Due Date</label>
                            <div id="dateError" class="error-text"></div>
                            <input type="date" id="date" class="form-control" min="">
                        </div>
                    
                    </div>
                
                    <div class="mb-3">
                        <label>Description</label>
                        <textarea id="description" rows="4" class="form-control" placeholder="Task description"></textarea>
                    </div>
                
                    
                    <div class="md-3">
                        <label>Priority</label>
                        <select id="priority"  class="form-select">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    
                
                    <button class="btn btn-add mt-4 w-100"  type="submit"> 
                        <i class="bi bi-plus-circle"></i> Add task
                    </button>
                
                </form>
            
            </div>
        
            <div class="top-bar mt-5"> 
                <div class="search-box"> 
                    <input type="text" id="search" class="form-control" placeholder="🔍 Search Task"> 
                </div>
            
                <div class="filter-box"> 
                    <select id="filterPriority" class="form-select"> 
                        <option value="All">All Priorities </option> 
                        <option value="High"> High</option>
                        <option value="Medium"> Medium</option> 
                        <option value="Low">  Low </option>
                    </select>
                </div>
            </div>
        
            <div id="taskContainer" class="row g-4"> </div>
        
            <div id="emptyMessage" class="empty"> 
                <i class="bi bi-clipboard-x display-1"></i>
                <h3 class="mt-3"> No Tasks Added Yet </h3> 
                <p> Start by adding your first task. </p> 
            </div> 
        </div> 

        <script src="../js/script.js"></script>
    </body>

</html>
